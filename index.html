<script>
  // ─────────────────────────────────────────────────────────────
  // FairClaimBC — GitHub Pages / static deployment
  // Calls Anthropic API directly from browser — no server needed
  // ─────────────────────────────────────────────────────────────
  const ANTHROPIC_API_KEY = "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";

  // window.claude — used by letter.jsx for dispute letter generation
  window.claude = {
    complete: async function(prompt) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type":      "application/json",
          "x-api-key":         ANTHROPIC_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-calls": "true",
        },
        body: JSON.stringify({
          model:      "claude-sonnet-4-6",
          max_tokens: 2000,
          messages:   [{ role: "user", content: prompt }],
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || "Claude API error");
      return (data.content || [])
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("");
    }
  };

  // Tweakable defaults
  window.__TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
    "price": 49,
    "letterTone": "assertive",
    "heroVariant": "directQuestion",
    "showTrustBar": true,
    "theme": "warm"
  }/*EDITMODE-END*/;
</script>

</body>
